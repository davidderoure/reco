syntax = "proto3";

package recommender;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// -------------------------------------------------------
// Service 1: Python acts as gRPC SERVER
//   C# client calls these methods on the Python server.
// -------------------------------------------------------
service RecommenderService {
  // Fire-and-forget event notifications (C# → Python)
  rpc UserAnsweredQuestion(UserAnsweredQuestionRequest) returns (google.protobuf.Empty);
  rpc UserProvidedMood(UserProvidedMoodRequest) returns (google.protobuf.Empty);
  rpc UserReadStory(UserReadStoryRequest) returns (google.protobuf.Empty);
  rpc UserBookmarkedStory(UserBookmarkedStoryRequest) returns (google.protobuf.Empty);

  // Request/response: returns 6 recommendations within 500ms
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);
}

// -------------------------------------------------------
// Service 2: Python acts as gRPC CLIENT
//   Python calls these methods on the C# server.
// -------------------------------------------------------
service StoryService {
  rpc GetStoryCatalogue(GetStoryCatalogueRequest) returns (GetStoryCatalogueResponse);
  rpc SaveUserModel(SaveUserModelRequest) returns (google.protobuf.Empty);
  rpc LoadUserModel(LoadUserModelRequest) returns (LoadUserModelResponse);
}

// -------------------------------------------------------
// Event request messages (C# → Python)
// -------------------------------------------------------

message UserAnsweredQuestionRequest {
  string user_id  = 1;
  string story_id = 2;
  int32  score    = 3;  // 1–10: end-of-story satisfaction rating
  google.protobuf.Timestamp timestamp = 4;
}

message UserProvidedMoodRequest {
  string user_id    = 1;
  int32  mood_score = 2;  // 1–10: current user mood
  google.protobuf.Timestamp timestamp = 3;
  string story_id   = 4;  // optional: set when mood is captured at end of a story
}

message UserReadStoryRequest {
  string user_id      = 1;
  string story_id     = 2;
  int32  read_percent = 3;  // 0–100: percentage of the story read so far
                            // ≥ 50% inferred as "viewed"; 100% inferred as "completed"
  google.protobuf.Timestamp timestamp = 4;
}

message UserBookmarkedStoryRequest {
  string user_id   = 1;
  string story_id  = 2;
  google.protobuf.Timestamp timestamp = 3;
  // No additional fields: bookmark is recorded for analytics only.
  // No current effect on recommendation weights or profile state.
}

// -------------------------------------------------------
// Recommendation request/response
// -------------------------------------------------------

message GetRecommendationsRequest {
  string user_id = 1;
  google.protobuf.Timestamp timestamp = 2;
}

message GetRecommendationsResponse {
  // Exactly 6 story IDs, in random order.
  // Breakdown: 2 content-based, 2 collaborative, 1 topical, 1 wildcard.
  repeated string story_ids = 1;
}

// -------------------------------------------------------
// Story catalogue messages (Python → C#)
// -------------------------------------------------------

message GetStoryCatalogueRequest {
  // Empty: always returns the full catalogue.
}

message StoryMessage {
  string story_id = 1;
  string title = 2;
  repeated string themes = 3;   // broad category labels, e.g. "craft"
  repeated string tags = 4;     // fine-grained content tags, e.g. "goldsmith"
  repeated string authors = 5;  // display names of the story's author(s)
}

message GetStoryCatalogueResponse {
  repeated StoryMessage stories = 1;
}

// -------------------------------------------------------
// User state persistence messages (Python ↔ C#)
// -------------------------------------------------------

// UserEventMessage is kept for incoming events from C# → Python only.
message UserEventMessage {
  string event_type = 1;                // "scored" | "mood" | "read_progress"
  string story_id = 2;                  // empty for mood events
  int32 score = 3;                      // 1–10 for scored/mood events; 0–100 for read_progress; 0 otherwise
  google.protobuf.Timestamp timestamp = 4;
}

// Compact user model persisted instead of a raw event log.
// Size is bounded by catalogue size + vocabulary, not by interaction history.

message MoodEntry {
  google.protobuf.Timestamp timestamp = 1;
  int32 score = 2;  // 1–10
}

message UserModelMessage {
  string user_id                      = 1;
  repeated string viewed_story_ids    = 2;
  repeated string completed_story_ids = 3;
  map<string, int32> story_scores     = 4;  // story_id → latest 1-10 rating
  repeated MoodEntry mood_scores      = 5;  // capped recent entries
  map<string, float>  theme_weights   = 6;  // accumulated preference weight per theme
  map<string, float>  tag_weights     = 7;  // accumulated preference weight per tag
  repeated string last_recommendations   = 8;  // previous rec set in slot order
  repeated string recommended_story_ids  = 9;  // all stories ever recommended
}

message SaveUserModelRequest  { repeated UserModelMessage user_models = 1; }
message LoadUserModelRequest  { repeated string user_ids = 1; }  // empty = all users
message LoadUserModelResponse { repeated UserModelMessage user_models = 1; }
